name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-14  # Apple Silicon runner
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # If you use XcodeGen:
      # - name: Install XcodeGen
      #   run: brew install xcodegen
      # - name: Generate project
      #   run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -scheme Deks \
            -configuration Release \
            -derivedDataPath build \
            -archivePath build/Deks.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO

      - name: Export app
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/Deks.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist \
          || true
          
          # Fallback: grab from archive directly
          if [ ! -f "build/export/Deks.app" ]; then
            cp -R "build/Deks.xcarchive/Products/Applications/Deks.app" build/Deks.app
          else
            cp -R build/export/Deks.app build/Deks.app
          fi

      - name: Create DMG
        run: |
          # Create a temporary directory for DMG contents
          mkdir -p build/dmg
          cp -R build/Deks.app build/dmg/
          ln -s /Applications build/dmg/Applications
          
          # Create DMG
          hdiutil create \
            -volname "Deks" \
            -srcfolder build/dmg \
            -ov \
            -format UDZO \
            build/Deks.dmg

      - name: Create ZIP (alternative download)
        run: |
          cd build
          zip -r Deks-macOS.zip Deks.app

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Deks v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            build/Deks.dmg
            build/Deks-macOS.zip
          body: |
            ## Deks v${{ steps.version.outputs.VERSION }}
            
            ### Install
            
            **Download:** [Deks.dmg](https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.VERSION }}/Deks.dmg)
            
            Or via Homebrew:
            ```bash
            brew install --cask deks
            ```
            
            ---
            
            **Requirements:** macOS 13.0+ (Ventura or later)
            
            **What's changed:**
