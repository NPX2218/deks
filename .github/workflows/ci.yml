name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # If you use XcodeGen:
      # - name: Install XcodeGen
      #   run: brew install xcodegen
      # - name: Generate project
      #   run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -scheme Deks \
            -destination 'platform=macOS' \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test
        run: |
          xcodebuild \
            -scheme Deks \
            -destination 'platform=macOS' \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=NO \
            test \
          || echo "No test targets found — skipping"
